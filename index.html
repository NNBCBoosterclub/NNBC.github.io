<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NNBC Snack Bar</title>
  <style>
    :root {
      --primary: #1a3a5c;
      --accent: #e8a020;
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --text: #1e2a38;
      --text-light: #5a6a7a;
      --border: #d0d8e4;
      --danger: #c0392b;
      --success: #27ae60;
      --badge: #e8a020;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.20);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .logo-icon {
      font-size: 1.6rem;
    }

    #cart-btn {
      position: relative;
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: filter 0.15s;
    }

    #cart-btn:hover { filter: brightness(1.1); }

    #cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--danger);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h2.section-title {
      font-size: 1.4rem;
      color: var(--primary);
      margin-bottom: 1.2rem;
      border-bottom: 3px solid var(--accent);
      padding-bottom: 0.4rem;
      display: inline-block;
    }

    /* ── Category tabs ── */
    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      background: var(--card-bg);
      border: 2px solid var(--border);
      color: var(--text-light);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn:hover, .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── Product grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.13);
    }

    .product-card.out-of-stock {
      opacity: 0.5;
    }

    .product-emoji {
      font-size: 2.8rem;
      line-height: 1;
    }

    .product-name {
      font-size: 0.92rem;
      font-weight: 600;
      text-align: center;
      color: var(--text);
    }

    .product-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      color: var(--primary);
    }

    .qty-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    .qty-display {
      min-width: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .add-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.12s;
      margin-top: 0.1rem;
    }

    .add-btn:hover { filter: brightness(1.15); }
    .add-btn:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; filter: none; }

    /* ── Cart Drawer ── */
    #cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
    }

    #cart-drawer {
      position: fixed;
      top: 0;
      right: -420px;
      width: 420px;
      max-width: 100vw;
      height: 100%;
      background: var(--card-bg);
      box-shadow: -4px 0 24px rgba(0,0,0,0.18);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
    }

    #cart-drawer.open { right: 0; }
    #cart-overlay.open { display: block; }

    .cart-header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 700;
    }

    #close-cart {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.2rem;
    }

    #close-cart:hover { color: var(--accent); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .cart-empty {
      text-align: center;
      color: var(--text-light);
      margin-top: 3rem;
      font-size: 1rem;
    }

    .cart-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-emoji { font-size: 1.8rem; min-width: 2rem; text-align: center; }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-unit { font-size: 0.8rem; color: var(--text-light); }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .cqty-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      transition: all 0.12s;
    }

    .cqty-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    .cqty-val { min-width: 22px; text-align: center; font-weight: 700; font-size: 0.9rem; }

    .cart-item-total {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 3.5rem;
      text-align: right;
      color: var(--primary);
    }

    .cart-footer {
      padding: 1rem 1.25rem;
      border-top: 2px solid var(--border);
      background: var(--card-bg);
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--primary);
    }

    #checkout-btn {
      width: 100%;
      padding: 0.85rem;
      background: #3d95ce;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: filter 0.15s;
      letter-spacing: 0.01em;
    }

    #checkout-btn:hover { filter: brightness(1.08); }
    #checkout-btn:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; filter: none; }

    .venmo-logo {
      font-size: 1rem;
      font-weight: 900;
    }

    /* ── Checkout Modal ── */
    #checkout-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    #checkout-modal.open {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 16px;
      width: 96%;
      max-width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .modal-header {
      background: var(--primary);
      color: #fff;
      padding: 1.1rem 1.4rem;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
    }

    #close-modal:hover { color: var(--accent); }

    .modal-body {
      padding: 1.4rem;
    }

    .order-summary-list {
      list-style: none;
      margin-bottom: 0.75rem;
    }

    .order-summary-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--bg);
      color: var(--text);
    }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--primary);
      padding-top: 0.5rem;
      margin-bottom: 1.2rem;
    }

    /* Venmo account highlight */
    .venmo-account-box {
      background: #eaf5ff;
      border: 2px solid #3d95ce;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.2rem;
    }

    .venmo-account-box .v-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #3d95ce;
      margin-bottom: 0.35rem;
    }

    .venmo-account-box .v-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary);
    }

    .venmo-account-box .v-handle {
      font-size: 0.92rem;
      color: #3d95ce;
      font-weight: 600;
    }

    .venmo-warning {
      background: #fff8e1;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      color: #7a5200;
      margin-bottom: 1.2rem;
      display: flex;
      gap: 0.4rem;
      align-items: flex-start;
    }

    .venmo-warning span:first-child { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
    }

    #cancel-checkout {
      flex: 1;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: background 0.12s;
    }

    #cancel-checkout:hover { background: var(--border); }

    #open-venmo-btn {
      flex: 2;
      padding: 0.75rem;
      background: #3d95ce;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: filter 0.12s;
    }

    #open-venmo-btn:hover { filter: brightness(1.08); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 400;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
      opacity: 0;
      pointer-events: none;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      #cart-drawer { width: 100vw; }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<header>
  <div class="logo">
    <span class="logo-icon">🛒</span>
    NNBC Snack Bar
  </div>
  <button id="cart-btn" aria-label="Open cart">
    🛒 Cart
    <span id="cart-badge"></span>
  </button>
</header>

<!-- ══════════════════════ MAIN ══════════════════════ -->
<main>
  <h2 class="section-title">Menu</h2>

  <!-- Category tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Product grid -->
  <div class="product-grid" id="product-grid"></div>
</main>

<!-- ══════════════════════ CART DRAWER ══════════════════════ -->
<div id="cart-overlay"></div>
<div id="cart-drawer" role="dialog" aria-label="Shopping Cart">
  <div class="cart-header">
    <span>🛒 Your Cart</span>
    <button id="close-cart" aria-label="Close cart">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cart-total">$0.00</span>
    </div>
    <button id="checkout-btn" disabled>
      <span class="venmo-logo">Venmo</span> Pay with Venmo
    </button>
  </div>
</div>

<!-- ══════════════════════ CHECKOUT MODAL ══════════════════════ -->
<div id="checkout-modal" role="dialog" aria-modal="true" aria-label="Checkout">
  <div class="modal-box">
    <div class="modal-header">
      <span>✅ Confirm &amp; Pay</span>
      <button id="close-modal" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:0.75rem;">Review your order before opening Venmo.</p>

      <ul class="order-summary-list" id="modal-order-list"></ul>
      <div class="order-total-row">
        <span>Total Due</span>
        <span id="modal-total"></span>
      </div>

      <!-- Venmo account info -->
      <div class="venmo-account-box">
        <div class="v-label">Pay this Venmo account</div>
        <div class="v-name" id="venmo-display-name"></div>
        <div class="v-handle" id="venmo-handle"></div>
      </div>

      <div class="venmo-warning">
        <span>⚠️</span>
        <span>
          There are two Venmo accounts with the same display name. Make sure the
          <strong>@handle</strong> shown above matches before confirming payment.
        </span>
      </div>

      <div class="modal-actions">
        <button id="cancel-checkout">Cancel</button>
        <button id="open-venmo-btn">
          Open Venmo <span style="font-size:1.1em">→</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════ TOAST ══════════════════════ -->
<div id="toast"></div>

<!-- ══════════════════════ SCRIPT ══════════════════════ -->
<script>
  // ─────────────────────────────────────────────────────
  //  CONFIGURATION — update items, prices and Venmo info
  // ─────────────────────────────────────────────────────
  const VENMO_USERNAME   = "NNBC-Snackbar";   // @handle (no @)
  const VENMO_DISPLAY    = "NNBC Snack Bar";  // Display name shown to user

  const PRODUCTS = [
    // { id, name, emoji, price, category }
    { id: 1,  name: "Chips",            emoji: "🥔", price: 1.00, category: "Snacks" },
    { id: 2,  name: "Pretzels",         emoji: "🥨", price: 1.00, category: "Snacks" },
    { id: 3,  name: "Granola Bar",      emoji: "🍫", price: 1.50, category: "Snacks" },
    { id: 4,  name: "Cookies",          emoji: "🍪", price: 1.00, category: "Snacks" },
    { id: 5,  name: "Crackers",         emoji: "🫙", price: 1.00, category: "Snacks" },
    { id: 6,  name: "Fruit Snacks",     emoji: "🍬", price: 1.00, category: "Snacks" },
    { id: 7,  name: "Popcorn",          emoji: "🍿", price: 1.00, category: "Snacks" },
    { id: 8,  name: "Candy Bar",        emoji: "🍫", price: 1.50, category: "Snacks" },
    { id: 9,  name: "Water",            emoji: "💧", price: 1.00, category: "Drinks" },
    { id: 10, name: "Sports Drink",     emoji: "🥤", price: 2.00, category: "Drinks" },
    { id: 11, name: "Juice Box",        emoji: "🧃", price: 1.50, category: "Drinks" },
    { id: 12, name: "Soda",             emoji: "🥤", price: 1.50, category: "Drinks" },
    { id: 13, name: "Hot Chocolate",    emoji: "☕", price: 2.00, category: "Drinks" },
    { id: 14, name: "Coffee",           emoji: "☕", price: 1.50, category: "Drinks" },
    { id: 15, name: "Sandwich",         emoji: "🥪", price: 4.00, category: "Food"   },
    { id: 16, name: "Hot Dog",          emoji: "🌭", price: 3.00, category: "Food"   },
    { id: 17, name: "Nachos",           emoji: "🧀", price: 3.00, category: "Food"   },
    { id: 18, name: "Pizza Slice",      emoji: "🍕", price: 3.00, category: "Food"   },
  ];

  // ─────────────────────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────────────────────
  const cart = {}; // { productId: quantity }

  // ─────────────────────────────────────────────────────
  //  DOM HELPERS
  // ─────────────────────────────────────────────────────
  const getById = id => document.getElementById(id);

  function formatPrice(n) { return "$" + n.toFixed(2); }

  function showToast(msg) {
    const t = getById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // ─────────────────────────────────────────────────────
  //  RENDER MENU
  // ─────────────────────────────────────────────────────
  const categories = ["All", ...new Set(PRODUCTS.map(p => p.category))];
  let activeCategory = "All";

  function buildTabs() {
    const container = getById("tabs");
    container.innerHTML = "";
    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
      btn.addEventListener("click", () => {
        activeCategory = cat;
        buildTabs();
        renderProducts();
      });
      container.appendChild(btn);
    });
  }

  function renderProducts() {
    const grid = getById("product-grid");
    grid.innerHTML = "";
    const filtered = activeCategory === "All"
      ? PRODUCTS
      : PRODUCTS.filter(p => p.category === activeCategory);

    filtered.forEach(p => {
      const qty = cart[p.id] || 0;
      const card = document.createElement("div");
      card.className = "product-card";
      card.dataset.id = p.id;
      card.innerHTML = `
        <div class="product-emoji">${p.emoji}</div>
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-price">${formatPrice(p.price)}</div>
        <div class="qty-control">
          <button class="qty-btn" data-action="dec" aria-label="Decrease quantity">−</button>
          <span class="qty-display" id="qty-${p.id}">${qty}</span>
          <button class="qty-btn" data-action="inc" aria-label="Increase quantity">+</button>
        </div>
        <button class="add-btn" ${qty === 0 ? 'disabled' : ''} data-id="${p.id}">
          ${qty === 0 ? 'Select quantity' : `Add ${qty} to cart`}
        </button>`;

      // Qty controls
      card.querySelectorAll(".qty-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const cur = parseInt($("qty-" + p.id).textContent, 10);
          const next = action === "inc" ? cur + 1 : Math.max(0, cur - 1);
          $("qty-" + p.id).textContent = next;
          const addBtn = card.querySelector(".add-btn");
          addBtn.disabled = next === 0;
          addBtn.textContent = next === 0 ? "Select quantity" : `Add ${next} to cart`;
        });
      });

      // Add to cart
      card.querySelector(".add-btn").addEventListener("click", () => {
        const qty = parseInt($("qty-" + p.id).textContent, 10);
        if (qty > 0) {
          cart[p.id] = (cart[p.id] || 0) + qty;
          $("qty-" + p.id).textContent = 0;
          card.querySelector(".add-btn").disabled = true;
          card.querySelector(".add-btn").textContent = "Select quantity";
          updateCartUI();
          showToast(`✅ ${qty}× ${p.name} added to cart`);
        }
      });

      grid.appendChild(card);
    });
  }

  // ─────────────────────────────────────────────────────
  //  CART UI
  // ─────────────────────────────────────────────────────
  function cartTotal() {
    return Object.entries(cart).reduce((sum, [id, qty]) => {
      const p = PRODUCTS.find(p => p.id === +id);
      return sum + (p ? p.price * qty : 0);
    }, 0);
  }

  function cartCount() {
    return Object.values(cart).reduce((s, q) => s + q, 0);
  }

  function updateCartUI() {
    const count = cartCount();
    const badge = getById("cart-badge");
    badge.textContent = count;
    badge.style.display = count > 0 ? "flex" : "none";

    const total = cartTotal();
    getById("cart-total").textContent = formatPrice(total);
    getById("checkout-btn").disabled = count === 0;

    renderCartItems();
  }

  function renderCartItems() {
    const container = getById("cart-items");
    const entries = Object.entries(cart).filter(([,q]) => q > 0);

    if (entries.length === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <span>🛒</span>
          Your cart is empty.<br>Add some snacks!
        </div>`;
      return;
    }

    container.innerHTML = "";
    entries.forEach(([id, qty]) => {
      const p = PRODUCTS.find(p => p.id === +id);
      if (!p) return;
      const row = document.createElement("div");
      row.className = "cart-item";
      row.innerHTML = `
        <div class="cart-item-emoji">${p.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${escHtml(p.name)}</div>
          <div class="cart-item-unit">${formatPrice(p.price)} each</div>
        </div>
        <div class="cart-item-qty">
          <button class="cqty-btn" data-id="${p.id}" data-action="dec" aria-label="Remove one ${escHtml(p.name)}">−</button>
          <span class="cqty-val">${qty}</span>
          <button class="cqty-btn" data-id="${p.id}" data-action="inc" aria-label="Add one ${escHtml(p.name)}">+</button>
        </div>
        <div class="cart-item-total">${formatPrice(p.price * qty)}</div>`;

      row.querySelectorAll(".cqty-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const pid = +btn.dataset.id;
          if (btn.dataset.action === "inc") {
            cart[pid] = (cart[pid] || 0) + 1;
          } else {
            cart[pid] = Math.max(0, (cart[pid] || 0) - 1);
            if (cart[pid] === 0) delete cart[pid];
          }
          updateCartUI();
        });
      });

      container.appendChild(row);
    });
  }

  // ─────────────────────────────────────────────────────
  //  CART OPEN / CLOSE
  // ─────────────────────────────────────────────────────
  function openCart() {
    getById("cart-drawer").classList.add("open");
    getById("cart-overlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeCart() {
    getById("cart-drawer").classList.remove("open");
    getById("cart-overlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  getById("cart-btn").addEventListener("click", openCart);
  getById("close-cart").addEventListener("click", closeCart);
  getById("cart-overlay").addEventListener("click", closeCart);

  // ─────────────────────────────────────────────────────
  //  CHECKOUT MODAL
  // ─────────────────────────────────────────────────────
  function openCheckout() {
    const entries = Object.entries(cart).filter(([,q]) => q > 0);
    const total   = cartTotal();

    // Build order list for modal
    const list = getById("modal-order-list");
    list.innerHTML = "";
    entries.forEach(([id, qty]) => {
      const p = PRODUCTS.find(p => p.id === +id);
      if (!p) return;
      const li = document.createElement("li");
      li.innerHTML = `<span>${p.emoji} ${qty}× ${escHtml(p.name)}</span><span>${formatPrice(p.price * qty)}</span>`;
      list.appendChild(li);
    });

    getById("modal-total").textContent   = formatPrice(total);
    getById("venmo-display-name").textContent = VENMO_DISPLAY;
    getById("venmo-handle").textContent  = "@" + VENMO_USERNAME;

    getById("checkout-modal").classList.add("open");
  }

  function closeCheckout() {
    getById("checkout-modal").classList.remove("open");
  }

  getById("checkout-btn").addEventListener("click", () => { closeCart(); openCheckout(); });
  getById("close-modal").addEventListener("click", closeCheckout);
  getById("cancel-checkout").addEventListener("click", closeCheckout);
  getById("checkout-modal").addEventListener("click", e => { if (e.target === getById("checkout-modal")) closeCheckout(); });

  // ─────────────────────────────────────────────────────
  //  VENMO DEEP LINK
  // ─────────────────────────────────────────────────────
  getById("open-venmo-btn").addEventListener("click", () => {
    const total = cartTotal();
    const note  = buildNote();

    // Venmo deep link – opens the app if installed, else falls back to web
    const params = new URLSearchParams({
      txn:       "pay",
      audience:  "private",
      recipients: VENMO_USERNAME,
      amount:    total.toFixed(2),
      note:      note,
    });
    const venmoUrl = "https://venmo.com/?" + params.toString();
    window.open(venmoUrl, "_blank", "noopener,noreferrer");

    closeCheckout();
    // Clear cart after opening Venmo
    Object.keys(cart).forEach(k => delete cart[k]);
    updateCartUI();
    showToast("Thanks! Complete payment in Venmo 🎉");
  });

  function buildNote() {
    const parts = Object.entries(cart)
      .filter(([,q]) => q > 0)
      .map(([id, qty]) => {
        const p = PRODUCTS.find(p => p.id === +id);
        return p ? `${qty}x ${p.name}` : "";
      })
      .filter(Boolean);
    return "NNBC Snack Bar: " + parts.join(", ");
  }

  // ─────────────────────────────────────────────────────
  //  SECURITY HELPER – prevent XSS
  // ─────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ─────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────
  buildTabs();
  renderProducts();
  updateCartUI();
</script>
</body>
</html>
